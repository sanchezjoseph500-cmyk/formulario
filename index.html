<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario</title>
    <link rel="stylesheet" href="style.css">



</head>
<body>
    <div id="header">
      <header>
        <h1>Formulario de Registro</h1>
      </header>
    </div>

    <hr>

    <!-- Nombres y apellidos-->
    <form action="" method="post">
    <div id="registro">
      <label for="Nombre">Nombres:</label><br>
    <input type="text" id="Nombres" name="Nombres" required><br>
    <label for="Apellido">Apellidos:</label><br>
    <input type="text" id="Apellido" name="Apellido" required><br>
</div>
    <hr>

    <!-- Correo electrónico -->
     <div id="correo"></div>
     <label for="email">Correo electrónico:</label><br>
     <input type="email" id="email" name="email"  placeholder="ejemplo@correo.com" required>
    </div>
     <br><br>

     <hr>

     <!-- Teléfono -->
      <div id="telefono">
        <label for="tel">Telefono:</label><br>
      <input type="tel" id="tel" name="tel"  maxlength="10" placeholder="123-456-7890" required>
      <span class="nota">Formato: 10 numeros sin espacio</span>
      </div>
      <br><br>

      <hr>
        <!-- Fecha de nacimiento -->
        <div id="fecha de nacimiento">
            <label for="fecha">Fecha de Nacimiento:</label><br>
        <input type="date" id="fecha" name="fecha" required><br>
        </div>
        <br><br>

        <hr>
        <!-- id -->
         <div id="DNI">
            <label for="tipo de documento">Tipo de Documento:</label><br>
         <select name="tipo de documento" id="tipo de documento">
            <option value="cedula de ciudadania">C.C</option>
            <option value="tarjeta de identidad">T.I</option>
            <option value="cedula de extranjeria">C.E</option>
         </select>
         <label for="numero de documento">Numero de documento:</label>
         <input type="text" id="numero de documento" name="numero de documento" maxlength="10" placeholder="1234567890" required>
         <span class="nota">Solo numeros y sin espacios ni puntos</span><br>
         </div>

      <hr>

      <!--menu desplegable-->
      <div id="menu">
        <label for="interes">Interes Princioal</label><br>
      <select name="interes" id="interes">
        <option value="diseño">Diseño</option>
        <option value="programacion">Programación</option>
        <option value="marketing">Marketing</option>
      </select>
      </div>
      <br><br>

      <hr>

      <!--envio-->
      <div id="enviar">
      <button type="submit">Enviar Información</button>
      </div>

      <hr>

      </form>
      <br>

     <div id="footer">
         <footer>Su informacion no sera compartida con terceros 😊</footer>
     </div>


</body>
</html>
